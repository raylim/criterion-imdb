name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "firefox-extension/**"
      - "scripts/package-extension.sh"
      - "package.json"
      - "package-lock.json"
      - "test/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Validate extension scripts
        run: |
          node --check firefox-extension/src/background.js
          node --check firefox-extension/src/content/criterion-overlay.js
          node --check firefox-extension/src/content/dom-scraper.js
          node --check firefox-extension/src/shared/matcher.js

      - name: Package Firefox extension
        run: npm run package:extension

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: criterion-imdb-extension
          path: firefox-extension/dist/*.xpi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: validate-and-package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
